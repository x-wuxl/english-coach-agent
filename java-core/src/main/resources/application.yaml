server:
  port: 8080

spring:
  application:
    name: java-core
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:192.168.5.247}:${POSTGRES_PORT:5432}/${POSTGRES_DB:english_coach}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 300000
      idle-timeout: 60000
      connection-test-query: SELECT 1
      validation-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID

python-agent:
  base-url: ${PYTHON_AGENT_URL:http://localhost:8000}
  enabled: ${PYTHON_AGENT_ENABLED:true}